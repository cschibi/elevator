<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 610"
     font-family="'Courier New', Courier, monospace" font-size="12">

  <!-- Background -->
  <rect width="800" height="610" fill="#f8fafc" rx="10"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="17" font-weight="bold" fill="#1e293b">
    Strategy Pattern — Elevator Scheduler (C99)
  </text>

  <!-- ═══════════════════════════════════════════════════════
       BUILDING (Context)   x=15 y=52 w=245 h=222
       ═══════════════════════════════════════════════════════ -->
  <rect x="15" y="52" width="245" height="222" rx="6"
        fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <!-- title bar -->
  <rect x="15" y="52" width="245" height="27" rx="6" fill="#2563eb"/>
  <rect x="15" y="70"  width="245" height="9"  fill="#2563eb"/>
  <text x="137" y="70" text-anchor="middle" fill="white"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="bold" font-size="12">«context»   Building</text>
  <!-- fields section -->
  <line x1="15" y1="91" x2="260" y2="91" stroke="#93c5fd" stroke-width="1"/>
  <text x="25" y="107" fill="#1e3a8a" font-size="11">SimConfig        config</text>
  <text x="25" y="123" fill="#1e3a8a" font-size="11">Elevator         elevators[]</text>
  <text x="25" y="139" fill="#1e3a8a" font-size="11">RequestQueue     queue</text>
  <text x="25" y="155" fill="#1d4ed8" font-size="11" font-weight="bold">SchedulerOps    *sched  ──►</text>
  <text x="25" y="171" fill="#1e3a8a" font-size="11">long             tick</text>
  <!-- methods section -->
  <line x1="15" y1="181" x2="260" y2="181" stroke="#93c5fd" stroke-width="1"/>
  <text x="25" y="197" fill="#1e3a8a" font-size="11">building_init(cfg)</text>
  <text x="25" y="213" fill="#1e3a8a" font-size="11">building_tick()</text>
  <text x="25" y="229" fill="#1e3a8a" font-size="11">building_request(floor, dir)</text>
  <text x="25" y="245" fill="#1e3a8a" font-size="11">building_set_scheduler(type)  ←</text>
  <text x="25" y="261" fill="#3b82f6" font-size="10" font-style="italic">  swaps *sched at runtime</text>

  <!-- ═══════════════════════════════════════════════════════
       SCHEDULER OPS (vtable / strategy)  x=465 y=52 w=300 h=192
       ═══════════════════════════════════════════════════════ -->
  <rect x="465" y="52" width="300" height="192" rx="6"
        fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <!-- title bar -->
  <rect x="465" y="52" width="300" height="27" rx="6" fill="#7c3aed"/>
  <rect x="465" y="70"  width="300" height="9"  fill="#7c3aed"/>
  <text x="615" y="70" text-anchor="middle" fill="white"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="bold" font-size="12">«vtable / strategy»   SchedulerOps</text>
  <!-- fields: function pointers -->
  <line x1="465" y1="91" x2="765" y2="91" stroke="#c4b5fd" stroke-width="1"/>
  <text x="475" y="107" fill="#4c1d95" font-size="11">const char   *name</text>
  <text x="475" y="123" fill="#4c1d95" font-size="11" font-weight="bold">void (*assign)(elevs, n, req)    ← dispatch</text>
  <text x="475" y="139" fill="#4c1d95" font-size="11">void (*tick_hook)(elevs, n)      // may be NULL</text>
  <text x="475" y="155" fill="#4c1d95" font-size="11">const char  *(*get_name)(void)</text>
  <!-- public api -->
  <line x1="465" y1="168" x2="765" y2="168" stroke="#c4b5fd" stroke-width="1"/>
  <text x="475" y="184" fill="#4c1d95" font-size="11">scheduler_get(SchedulerType t)</text>
  <text x="475" y="200" fill="#4c1d95" font-size="11">scheduler_list()</text>
  <text x="475" y="216" fill="#7c3aed" font-size="10" font-style="italic">// returns const ptr from registry[]</text>
  <text x="475" y="230" fill="#7c3aed" font-size="10" font-style="italic">// all members are function pointers</text>

  <!-- ═══════════════════════════════════════════════════════
       ARROW: Building *sched  ──►  SchedulerOps
       ═══════════════════════════════════════════════════════ -->
  <defs>
    <marker id="mSlate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#475569"/>
    </marker>
    <marker id="mViolet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#6d28d9"/>
    </marker>
    <marker id="mAmber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#b45309"/>
    </marker>
    <marker id="mHollow" markerWidth="12" markerHeight="9" refX="10" refY="4.5" orient="auto">
      <polygon points="0 0,10 4.5,0 9" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.2"/>
    </marker>
  </defs>

  <line x1="262" y1="155" x2="463" y2="155"
        stroke="#475569" stroke-width="2"
        marker-end="url(#mSlate)"/>
  <rect x="280" y="140" width="162" height="16" fill="#f8fafc" rx="3"/>
  <text x="361" y="152" text-anchor="middle" fill="#334155"
        font-size="10" font-style="italic">uses via *sched pointer</text>

  <!-- ═══════════════════════════════════════════════════════
       REGISTRY  x=465 y=295 w=300 h=125
       ═══════════════════════════════════════════════════════ -->
  <rect x="465" y="295" width="300" height="125" rx="6"
        fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <!-- title bar -->
  <rect x="465" y="295" width="300" height="27" rx="6" fill="#d97706"/>
  <rect x="465" y="313"  width="300" height="9"  fill="#d97706"/>
  <text x="615" y="313" text-anchor="middle" fill="white"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="bold" font-size="12">registry[]   in   scheduler.c</text>
  <line x1="465" y1="334" x2="765" y2="334" stroke="#fcd34d" stroke-width="1"/>
  <text x="475" y="352" fill="#78350f" font-size="11">[SCHED_FCFS]  =  &amp;fcfs_ops</text>
  <text x="475" y="370" fill="#78350f" font-size="11">[SCHED_LOOK]  =  &amp;look_ops</text>
  <text x="475" y="388" fill="#78350f" font-size="11">[SCHED_SSTF]  =  &amp;sstf_ops</text>
  <text x="475" y="410" fill="#92400e" font-size="10" font-style="italic">scheduler_get(type) returns registry[type]</text>

  <!-- ARROW: SchedulerOps  ──(dashed)──►  Registry -->
  <line x1="615" y1="244" x2="615" y2="293"
        stroke="#6d28d9" stroke-width="1.6"
        stroke-dasharray="5,3"
        marker-end="url(#mViolet)"/>
  <rect x="620" y="261" width="138" height="15" fill="#f8fafc" rx="2"/>
  <text x="689" y="272" text-anchor="middle" fill="#6d28d9"
        font-size="10" font-style="italic">scheduler_get(type)</text>

  <!-- ═══════════════════════════════════════════════════════
       GROUP CONTAINER for concrete instances
       ═══════════════════════════════════════════════════════ -->
  <rect x="8" y="457" width="745" height="143" rx="8"
        fill="#f0fdf4" stroke="#7c3aed" stroke-width="1.2"
        stroke-dasharray="7,4"/>
  <rect x="215" y="450" width="340" height="16" fill="#f8fafc"/>
  <text x="385" y="463" text-anchor="middle"
        fill="#6d28d9" font-size="11" font-weight="bold"
        font-family="Arial, Helvetica, sans-serif">
    «concrete SchedulerOps»  —  all are static instances in scheduler.c
  </text>

  <!-- ARROW: group top  ──(dashed hollow)──►  SchedulerOps bottom -->
  <line x1="385" y1="457" x2="560" y2="246"
        stroke="#7c3aed" stroke-width="1.3"
        stroke-dasharray="6,3"
        marker-end="url(#mHollow)"/>
  <rect x="425" y="336" width="72" height="15" fill="#f8fafc" rx="2"/>
  <text x="461" y="347" text-anchor="middle" fill="#7c3aed"
        font-size="10" font-style="italic">«realizes»</text>

  <!-- ═══════════════════════════════════════════════════════
       CONCRETE: fcfs_ops   x=18 y=468 w=220 h=125
       ═══════════════════════════════════════════════════════ -->
  <rect x="18" y="468" width="220" height="125" rx="5"
        fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="18" y="468" width="220" height="27" rx="5" fill="#16a34a"/>
  <rect x="18" y="486"  width="220" height="9"  fill="#16a34a"/>
  <text x="128" y="486" text-anchor="middle" fill="white"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="bold" font-size="12">fcfs_ops</text>
  <line x1="18" y1="507" x2="238" y2="507" stroke="#86efac" stroke-width="1"/>
  <text x="28" y="523" fill="#14532d" font-size="11">name      = "FCFS"</text>
  <text x="28" y="539" fill="#15803d" font-size="11" font-weight="bold">assign    = fcfs_assign</text>
  <text x="28" y="555" fill="#14532d" font-size="11">tick_hook = NULL</text>
  <text x="28" y="571" fill="#166534" font-size="10" font-style="italic">Min pending-stops wins</text>

  <!-- ═══════════════════════════════════════════════════════
       CONCRETE: look_ops   x=265 y=468 w=220 h=125
       ═══════════════════════════════════════════════════════ -->
  <rect x="265" y="468" width="220" height="125" rx="5"
        fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="265" y="468" width="220" height="27" rx="5" fill="#16a34a"/>
  <rect x="265" y="486"  width="220" height="9"  fill="#16a34a"/>
  <text x="375" y="486" text-anchor="middle" fill="white"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="bold" font-size="12">look_ops</text>
  <line x1="265" y1="507" x2="485" y2="507" stroke="#86efac" stroke-width="1"/>
  <text x="275" y="523" fill="#14532d" font-size="11">name      = "LOOK"</text>
  <text x="275" y="539" fill="#15803d" font-size="11" font-weight="bold">assign    = look_assign</text>
  <text x="275" y="555" fill="#14532d" font-size="11">tick_hook = NULL</text>
  <text x="275" y="571" fill="#166534" font-size="10" font-style="italic">dispatch_cost() + dir penalty</text>

  <!-- ═══════════════════════════════════════════════════════
       CONCRETE: sstf_ops   x=512 y=468 w=230 h=125
       ═══════════════════════════════════════════════════════ -->
  <rect x="512" y="468" width="230" height="125" rx="5"
        fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="512" y="468" width="230" height="27" rx="5" fill="#16a34a"/>
  <rect x="512" y="486"  width="230" height="9"  fill="#16a34a"/>
  <text x="627" y="486" text-anchor="middle" fill="white"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="bold" font-size="12">sstf_ops</text>
  <line x1="512" y1="507" x2="742" y2="507" stroke="#86efac" stroke-width="1"/>
  <text x="522" y="523" fill="#14532d" font-size="11">name      = "SSTF"</text>
  <text x="522" y="539" fill="#15803d" font-size="11" font-weight="bold">assign    = sstf_assign</text>
  <text x="522" y="555" fill="#14532d" font-size="11">tick_hook = NULL</text>
  <text x="522" y="571" fill="#166534" font-size="10" font-style="italic">Greedy distance(); may starve</text>

  <!-- ═══════════════════════════════════════════════════════
       ARROWS: registry[]  ──►  concrete instances
       registry bottom: y = 295+125 = 420
       FCFS center x=128, LOOK center x=375, SSTF center x=627
       ═══════════════════════════════════════════════════════ -->
  <!-- → FCFS -->
  <line x1="510" y1="420" x2="128" y2="466"
        stroke="#b45309" stroke-width="1.5"
        marker-end="url(#mAmber)"/>
  <!-- → LOOK -->
  <line x1="590" y1="420" x2="375" y2="466"
        stroke="#b45309" stroke-width="1.5"
        marker-end="url(#mAmber)"/>
  <!-- → SSTF -->
  <line x1="690" y1="420" x2="627" y2="466"
        stroke="#b45309" stroke-width="1.5"
        marker-end="url(#mAmber)"/>
  <!-- label for registry arrows -->
  <rect x="225" y="430" width="190" height="15" fill="#f8fafc" rx="2"/>
  <text x="320" y="441" text-anchor="middle" fill="#b45309"
        font-size="10" font-style="italic">pointer stored in registry[]</text>

  <!-- ═══════════════════════════════════════════════════════
       SWAP PATH note (bottom-left, below Building)
       ═══════════════════════════════════════════════════════ -->
  <rect x="15" y="292" width="245" height="105" rx="5"
        fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.2"
        stroke-dasharray="4,3"/>
  <text x="137" y="310" text-anchor="middle"
        fill="#475569" font-size="11" font-weight="bold"
        font-family="Arial, Helvetica, sans-serif">Runtime swap path</text>
  <line x1="15" y1="316" x2="260" y2="316" stroke="#cbd5e1" stroke-width="1"/>
  <text x="25" y="332" fill="#475569" font-size="10">1. user:  S &lt;name&gt;  in CLI</text>
  <text x="25" y="348" fill="#475569" font-size="10">2. building_set_scheduler(type)</text>
  <text x="25" y="364" fill="#475569" font-size="10">3. scheduler_get(type)</text>
  <text x="25" y="380" fill="#475569" font-size="10">4. b-&gt;sched = registry[type]</text>
  <text x="25" y="390" fill="#64748b" font-size="9" font-style="italic">   *sched pointer swapped; no rebuild needed</text>

  <!-- curved arrow from swap note to *sched field in Building -->
  <path d="M 137,292 Q 137,268 137,252"
        stroke="#94a3b8" stroke-width="1.3" fill="none"
        stroke-dasharray="4,3"
        marker-end="url(#mSlate)"/>

</svg>
